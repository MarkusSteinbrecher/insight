# Phase 3 Conclusions — Enterprise Architecture for AI
# Generated: 2026-02-27
# Steps: 3.1 (Actionability), 3.2 (Recommendations), 3.3 (Thought Leadership Angles)

meta:
  topic: ea-for-ai
  target_audience: "Enterprise architects, CIOs, CTOs, technology leaders responsible for AI strategy and architecture"
  generated: 2026-02-27

# ──────────────────────────────────────────────────────────────────────
# Step 3.1 — Actionability Assessment
# For each finding: can a practitioner act on this within 6 months?
# ──────────────────────────────────────────────────────────────────────

actionability:
  - finding_id: finding-01
    actionability: high
    barriers:
      - "Governance boards and review processes are institutionally entrenched — changing them requires executive sponsorship"
      - "AI-augmented EA tooling (automated discovery, conformance checking) remains immature for most repository platforms"
      - "Organisations lack the data quality and repository completeness to feed automated governance"
    missing_for_action: "A proven reference implementation of continuous, automated EA governance — most examples remain aspirational. Practitioners need a concrete before/after showing the transition from periodic review boards to automated conformance checking with exception-based human review."

  - finding_id: finding-02
    actionability: high
    barriers:
      - "Inertia toward single-vendor, single-model deployments — switching costs are perceived as high"
      - "Lack of internal benchmarking capability to compare model performance on domain-specific tasks"
      - "Procurement processes not designed for multi-model, multi-vendor AI portfolios"
    missing_for_action: "Standardised evaluation frameworks for comparing model performance on enterprise-specific tasks. Most organisations lack the tooling and methodology to run head-to-head evaluations of fine-tuned SLMs versus frontier models on their own data."

  - finding_id: finding-03
    actionability: medium
    barriers:
      - "Multi-agent systems at enterprise scale remain largely theoretical — most deployments are single-agent or simple orchestration"
      - "Inter-agent communication standards (MCP, A2A) are still evolving and lack production maturity"
      - "Existing observability and risk frameworks were not designed for non-deterministic agent interactions"
      - "Organisational skills gap — few teams have experience designing and operating multi-agent systems"
    missing_for_action: "Production-grade reference architectures with proven blast-radius controls for multi-agent systems. The risk management frameworks for cascading agent failures do not yet exist as implementable patterns."

  - finding_id: finding-05
    actionability: high
    barriers:
      - "Cultural resistance — process owners resist redesign, preferring incremental automation of existing workflows"
      - "Lack of process mining maturity — many organisations cannot quantify their current processes"
      - "POC fatigue dilutes focus — too many AI initiatives, too few properly redesigned processes"
    missing_for_action: "A step-by-step methodology for agent-native process redesign. Process redesign for automation has a 30-year history (BPR, Lean, Six Sigma); process redesign for agentic AI has none. Practitioners need a structured approach, not just the principle."

  - finding_id: finding-06
    actionability: medium
    barriers:
      - "CEO-CIO expectation misalignment on AI value type (revenue vs. productivity) is politically sensitive to surface"
      - "Phase-one platforms built for productivity may lack the data pipelines, integration depth, and reliability required for revenue-generating AI"
      - "Only 10% of organisations have mature AI FinOps — spending governance lags investment pace"
    missing_for_action: "A practical framework for planning the platform transition from phase-one (productivity) to phase-two (revenue) AI — including the architectural requirements that differ between the two. Also lacking: a mature AI FinOps discipline with standard cost categories and benchmarks."

  - finding_id: finding-07
    actionability: medium
    barriers:
      - "No established discipline or framework for agent management exists yet — organisations must improvise"
      - "Organisational ownership of agents is unresolved — neither IT nor business domains have clear accountability"
      - "Existing ITSM tools and processes do not accommodate non-deterministic, stateful agents"
    missing_for_action: "A comprehensive Agent Service Management framework. The field needs the equivalent of ITIL for AI agents — covering onboarding, performance monitoring, incident response for agent misbehaviour, and decommissioning. No vendor, standards body, or consultancy has published one."

  - finding_id: finding-08
    actionability: medium
    barriers:
      - "Infrastructure investment is capital-intensive and competes with AI model and agent spending for budget"
      - "AI infrastructure requirements are poorly understood — most organisations cannot size requirements for planned workloads"
      - "The industry narrative focuses on models and agents, making infrastructure investment harder to justify to leadership"
    missing_for_action: "Standard benchmarks for AI infrastructure requirements by workload profile. What compute, network, and storage capacity does a production multi-agent system require? How do infrastructure requirements scale with agent count? The field lacks calibrated benchmarks."

  - finding_id: finding-09
    actionability: low
    barriers:
      - "Codifying implicit operating models is a large, multi-year organisational undertaking"
      - "No reference implementations or mature tooling exist for Enterprise as Code"
      - "Requires cross-functional collaboration between business, IT, and operations — organisational silos resist this"
      - "ROI is difficult to quantify in advance, making the investment case challenging"
    missing_for_action: "Case studies from organisations that have attempted operating model codification, even partially. The concept is compelling but untested at scale. Practitioners need lessons learned, tooling comparisons, and realistic timelines before committing."

  - finding_id: finding-10
    actionability: medium
    barriers:
      - "Sovereignty requirements add complexity and cost to infrastructure architecture"
      - "Multi-jurisdictional operations face conflicting regulatory requirements"
      - "Single-hyperscaler approaches may not satisfy sovereignty constraints, requiring multi-cloud complexity"
    missing_for_action: "A sovereignty assessment framework that maps AI workloads to their data residency, model provenance, and jurisdictional constraints — with architectural patterns for each scenario. Most organisations treat sovereignty reactively rather than as a design input."

# ──────────────────────────────────────────────────────────────────────
# Step 3.2 — Prioritised Recommendations
# Sequenced by dependency and effort. What must come first, what delivers quick wins.
# ──────────────────────────────────────────────────────────────────────

recommendations:
  - id: rec-01
    title: "Measure your governance cycle time and compare it against deployment cadence"
    description: "Calculate the elapsed time from architecture proposal submission to approved decision. Compare it against your AI deployment cadence. If governance takes longer than deployment, you are making decisions on stale information. This measurement alone will quantify the urgency of governance reform and build the case for change."
    priority: high
    effort: low
    dependencies: []
    related_findings: [finding-01]

  - id: rec-02
    title: "Create an AI agent registry for all deployed agents"
    description: "Document every deployed AI agent with its role, capabilities, access permissions, data inputs, decision authority, performance metrics, and accountable human owner. This is the minimum viable foundation for agent management, regardless of which management framework emerges. Start with what you have deployed today."
    priority: high
    effort: low
    dependencies: []
    related_findings: [finding-07, finding-03]

  - id: rec-03
    title: "Audit AI use cases and classify by task complexity for model right-sizing"
    description: "Catalogue current AI use cases and classify each by task complexity. Run head-to-head evaluations of a fine-tuned smaller model versus your default frontier model on your top three production use cases, measuring accuracy, latency, and cost per inference. The results will likely identify significant cost savings without performance loss."
    priority: high
    effort: medium
    dependencies: []
    related_findings: [finding-02]

  - id: rec-04
    title: "Conduct an infrastructure readiness assessment against your AI roadmap"
    description: "Map each planned AI workload to its compute, network, storage, and integration requirements. Compare against current capacity to identify the infrastructure investment gap. Include sovereignty constraints where applicable. The delta is your infrastructure investment gap — and it will likely be larger than your AI team has estimated."
    priority: high
    effort: medium
    dependencies: []
    related_findings: [finding-08, finding-10]

  - id: rec-05
    title: "Classify AI investments by value type and align with leadership expectations"
    description: "Survey your C-suite: what is the primary expected outcome of AI investments — productivity or revenue growth? Classify your current AI portfolio by value type (productivity/cost savings versus revenue/growth). If there is a gap between the portfolio and expectations, restructure with explicit buckets and different KPIs for each."
    priority: high
    effort: low
    dependencies: []
    related_findings: [finding-06]

  - id: rec-06
    title: "Assess process readiness before approving AI agent deployments"
    description: "For every proposed AI agent deployment, answer two questions before approval. First: is the target process documented with quantitative data? If not, invest in process mining first. Second: has the workflow been redesigned for agent strengths, or is the agent being inserted into a human-shaped process? If the latter, redesign before deploying."
    priority: high
    effort: medium
    dependencies: [rec-01]
    related_findings: [finding-05]

  - id: rec-07
    title: "Design a model abstraction layer for provider portability"
    description: "Implement a model abstraction layer with standardised interfaces, vendor-neutral APIs, and no direct dependencies on provider-specific SDKs. The litmus test: can your organisation swap its primary LLM provider within eight hours? If not, you have vendor lock-in disguised as an architecture decision. This enables A/B testing across providers, rapid response to pricing changes, and graceful degradation."
    priority: medium
    effort: medium
    dependencies: [rec-03]
    related_findings: [finding-02]

  - id: rec-08
    title: "Implement a protocol abstraction layer for agent communication"
    description: "Design your AI platform with a communication abstraction layer that decouples agent implementations from protocol specifics (MCP, A2A, or proprietary). The defining architectural bet is not which protocol to adopt but whether you abstract the protocol layer at all. This enables protocol migration as standards consolidate without rebuilding agents."
    priority: medium
    effort: medium
    dependencies: [rec-02]
    related_findings: [finding-03]

  - id: rec-09
    title: "Establish AI FinOps discipline before spending accelerates further"
    description: "If you are in the 90% of organisations without mature AI FinOps, establish it now. Define standard cost categories for AI operations (inference, fine-tuning, vector storage, agent orchestration, infrastructure). Implement cost tracking per use case. Set budget thresholds and escalation triggers. AI budgets are rising from 3% to 5% of annual business budgets — financial governance must keep pace."
    priority: medium
    effort: medium
    dependencies: [rec-05]
    related_findings: [finding-06, finding-08]

  - id: rec-10
    title: "Pilot operating model codification with one high-volume process"
    description: "Identify one high-volume, high-value business process and make its operating logic explicit and machine-readable — decision rules, exception paths, and governance controls in a format an AI agent could interpret. This does not require a multi-year ontology project. Use this as the pilot for broader Enterprise as Code adoption and to assess how much implicit knowledge needs to be codified."
    priority: medium
    effort: high
    dependencies: [rec-06]
    related_findings: [finding-09, finding-05]

  - id: rec-11
    title: "Map sovereignty requirements to AI workloads and infrastructure"
    description: "Audit current and planned AI workloads for data residency, model provenance, and jurisdictional constraints. Where sovereignty requirements apply, assess whether current cloud and infrastructure architecture can satisfy them. If operating across EU and non-EU jurisdictions, sovereignty is a current architecture constraint, not a future concern."
    priority: medium
    effort: medium
    dependencies: [rec-04]
    related_findings: [finding-10]

  - id: rec-12
    title: "Implement distributed tracing and blast-radius controls for agent interactions"
    description: "Before deploying your second agent into production, implement distributed tracing across agent interactions and define blast-radius controls. When agents influence each other through shared context or chained outputs, the risk dynamic shifts from linear to non-linear. Existing observability was not built for systems where one agent's inaccurate output becomes another agent's confident input."
    priority: medium
    effort: high
    dependencies: [rec-02, rec-08]
    related_findings: [finding-03]

# ──────────────────────────────────────────────────────────────────────
# Step 3.3 — Thought Leadership Angles
# Positions the data supports but no source states plainly.
# ──────────────────────────────────────────────────────────────────────

angles:
  - id: angle-01
    title: "Governance Principles for AI: The Post-Framework Playbook"
    position: "TOGAF as a process is finished for AI-era architecture. What survives are governance principles — separation of concerns, model portability, observability by default, automated compliance, tiered decision authority — which should be presented as standalone principles with automated enforcement patterns, not anchored to any framework."
    why_novel: "No source states this plainly because TOGAF certification is a multi-million-dollar ecosystem with institutional incentives to position adaptation, not abandonment. The practitioner reality — that most organisations do not use TOGAF formally — makes the direct formulation both more honest and more useful."
    supporting_claims: [cc-104, cc-101, cc-046]
    suggested_format: pov

  - id: angle-02
    title: "The Knowledge Graph Imperative: Why Your Agent Strategy Has the Stack Upside Down"
    position: "The enterprise knowledge graph is not a component of the AI architecture — it is the foundation on which every other component depends. Organisations that invest in knowledge infrastructure before agent infrastructure will outperform those who do the reverse, because agents without shared semantic context generate activity without alignment."
    why_novel: "No source says this forcefully enough because the knowledge graph investment case is intimidating — multi-year, hard to quantify in advance. It is easier to sell agent frameworks and model APIs. But the data consistently shows that the upstream knowledge decision determines whether downstream AI investments produce organisational value or generic outputs."
    supporting_claims: [cc-078, cc-136]
    suggested_format: blog

  - id: angle-03
    title: "Agent Service Management: An ITIL for the Silicon Workforce"
    position: "AI agents require a management discipline analogous to ITIL but designed for non-deterministic, stateful, autonomous digital workers. The first organisation or standards body to publish a comprehensive Agent Service Management framework — covering onboarding, performance monitoring, incident response, and decommissioning — defines the category."
    why_novel: "No source develops this into a comprehensive framework because the problem is still emerging. But agent count will scale the way microservice count scaled, and organisations that build management discipline early will avoid the operational chaos that plagued the early microservices era. The field is genuinely open."
    supporting_claims: [cc-132, cc-065, cc-157]
    suggested_format: pov

  - id: angle-04
    title: "The Governance Paradox: How Your AI Controls Are Creating the Risk They Claim to Prevent"
    position: "In the AI era, traditional governance does not reduce risk — it creates risk. Governance cycles longer than deployment cycles produce decisions on stale information, and the governance process itself becomes a source of the instability it was designed to prevent. With only 11% of organisations having operationalised responsible AI, 89% are governing by hope rather than by system."
    why_novel: "No source frames governance as risk-creating rather than risk-reducing because governance teams are both the audience and the subject of the critique. The evidence from PwC's survey data and the acceleration paradox (cc-106) supports the position, but institutional caution suppresses the direct formulation."
    supporting_claims: [cc-101, cc-106]
    suggested_format: linkedin

  - id: angle-05
    title: "The Real AI Architecture Decision Is the Inter-Agent Communication Layer"
    position: "The defining architectural bet of 2026-2028 is not which models to use or which agents to build — it is how agents communicate. Just as HTTP/REST defined the integration architecture of the SOA era, the agent communication layer will define the agent era. The recommendation is to abstract the protocol layer rather than commit to a specific protocol."
    why_novel: "No source commits to this position because the protocols (MCP, A2A, ACP) are early, and recommending one risks obsolescence. The architectural principle — abstract the protocol layer — is the durable insight, but it requires stating that protocol choice is the defining decision, which most sources avoid."
    supporting_claims: [cc-026, cc-012, cc-078]
    suggested_format: pov

  - id: angle-06
    title: "The Infrastructure Gap Is the Real AI Bottleneck"
    position: "The gap between AI ambition and infrastructure capability is the binding constraint on enterprise AI — not model capability, not governance maturity, not talent availability. Only 14% of companies are infrastructure-ready. The industry built the brain (models) without building the nervous system (infrastructure). The organisations that quietly invest in infrastructure while competitors chase agent frameworks will be the ones that actually scale production AI."
    why_novel: "This is the contrarian position the data most strongly supports but the industry least wants to hear. 'Invest in infrastructure' does not sell conference keynotes or consulting engagements. But the survey data from KPMG (n=2,500), PwC (n=1,415), and Capgemini (n=1,500+) converges on infrastructure as the binding constraint."
    supporting_claims: [cc-137, cc-146, cc-150, cc-162]
    suggested_format: pov

  - id: angle-07
    title: "Enterprise as Code: Making Your Organisation Machine-Readable"
    position: "Organisations must codify their implicit operating models — processes, decision logic, governance rules — as executable code that both people and AI systems can read and act on. This is the most conceptually novel contribution in the research corpus and connects process redesign, AI-augmented EA, governance automation, and knowledge management into a unified paradigm."
    why_novel: "BCG introduced this concept but it has not been amplified beyond a single consultancy publication. No organisation has fully implemented Enterprise as Code. The concept lacks reference implementations and mature tooling. But the directional logic is compelling: AI agents operate on the basis of knowledge, and most organisations have never written down how they actually work."
    supporting_claims: [cc-153, cc-154, cc-155, cc-149]
    suggested_format: blog

  - id: angle-08
    title: "AI Sovereignty as Architecture: Why Your Cloud Decision Is a Geopolitical Decision"
    position: "Sovereignty is an architecture decision that constrains every subsequent design choice — not a compliance checkbox handled by legal and procurement. Where data resides, which models process it, what cloud providers are acceptable, and what cost structures are viable are strategic questions. Organisations that treat sovereignty as a post-hoc policy overlay will discover their AI infrastructure was built in the wrong place."
    why_novel: "Most organisations and advisory sources treat sovereignty as a policy or compliance concern. The data — 82% of EMEA organisations refining cloud approaches due to geopolitics, 54% prioritising data sovereignty — shows it is already an architecture constraint. EY's 'sovereignty-by-default' is the right principle, but it requires sovereignty to be a first-order design input."
    supporting_claims: [cc-148, cc-044]
    suggested_format: blog
